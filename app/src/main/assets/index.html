<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dieta do Zen</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="shell">
    <header class="header">
      <div>
        <p class="small">Dieta do Zen</p>
        <h1>Controle de Calorias</h1>
      </div>
      <div class="badge">ZEN</div>
    </header>

    <section class="hero">
      <div>
        <p class="muted">Consumidas hoje</p>
        <h2 id="totalCalories">0 kcal</h2>
      </div>
      <div class="circle">
        <span id="remaining">2000</span>
        <small>restantes</small>
      </div>
    </section>

    <div class="progress"><div class="bar" id="bar"></div></div>

    <section class="cards">
      <button class="card-btn" onclick="openTab('add')">➕ Adicionar</button>
      <button class="card-btn" onclick="openTab('stats')">📊 Estatísticas</button>
      <button class="card-btn" onclick="openTab('goal')">🎯 Meta diária</button>
      <button class="card-btn" onclick="clearMeals()">🗑 Limpar dia</button>
    </section>

    <section class="panel active" id="home">
      <h3>Refeições</h3>
      <ul id="mealList"></ul>
      <p class="muted" id="emptyLabel">Nenhum alimento registrado.</p>
    </section>

    <section class="panel" id="add">
      <h3>Adicionar alimento</h3>
      <select id="presetFood"></select>
      <input id="foodName" placeholder="Nome do alimento">
      <input id="foodCalories" type="number" placeholder="Calorias">
      <button class="primary" onclick="addMeal()">Salvar</button>
    </section>

    <section class="panel" id="stats">
      <h3>Estatísticas</h3>
      <div class="stats">
        <div class="stat"><span>Total de refeições</span><strong id="mealCount">0</strong></div>
        <div class="stat"><span>Média por refeição</span><strong id="average">0 kcal</strong></div>
      </div>
    </section>

    <section class="panel" id="goal">
      <h3>Meta diária</h3>
      <input id="goalInput" type="number" placeholder="Ex.: 2000">
      <button class="primary" onclick="saveGoal()">Salvar meta</button>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
